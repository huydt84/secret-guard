version: 2

project_name: secretguard

builds:
  - id: secretguard
    main: ./cmd/secretguard
    binary: secretguard
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/huydt84/secret-guard/internal/cli.Version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: secretguard
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: secretguard_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*
    wrap_in_directory: false

checksum:
  name_template: checksums.txt
